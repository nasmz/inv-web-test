<div class="container mt-4">

    <div class="card">

        <div class="card-header">

            <h4>{{isEditMode ? 'Edit Invoice' : 'Create Invoice'}}</h4>

        </div>

        <div class="card-body">
            <form [formGroup]="invoiceForm">
                <div class="row">
                    <div class="col-md-6">
                        <label>Customer</label>
                        <select class="form-select" formControlName="customerId">
                            <option value="">
                                Select Customer
                            </option>
                            <option
                                *ngFor="let cus of customerList"
                                [value]="cus.id">
                                {{cus.name}}
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label>Invoice No</label>
                        <input
                            type="text"
                            class="form-control"
                            formControlName="invoiceNo"
                            [readonly]="isEditMode">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <label>Invoice Date</label>
                        <input
                            type="date"
                            class="form-control"
                            formControlName="invoiceDate">
                    </div>

                    <div class="col-md-6">
                        <label>Status</label>
                        <select class="form-select" formControlName="statusId">
                            <option value="">
                                Select Status
                            </option>
                            <option
                                *ngFor="let status of statusList"
                                [value]="status.id">
                                {{status.name}}
                            </option>
                        </select>
                    </div>
                </div>

                   <!-- ITEMS Table -->
                <div>
                    <h5 class="mt-4">
                        Product Details
                    </h5>
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Unit Price</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody formArrayName="itemDetails">
                            <tr *ngFor="let detail of itemDetails.controls; let i=index" [formGroupName]="i">
                                <td>
                                    <select 
                                        class="form-select"
                                        formControlName="productId"
                                        (change)="onItemChange($event, i)">

                                        <option value="">
                                            Select Product
                                        </option>

                                        <option *ngFor="let product of productList" [value]="product.id">
                                            {{product.name}}
                                        </option>
                                    </select>
                                </td>
                                <!-- Quantity -->
                                <td>
                                    <input
                                        type="number"
                                        class="form-control"
                                        formControlName="quantity"
                                        (change)="calSubTotal(i)">
                                </td>
                                <!-- Unit Price -->
                                <td>
                                    <input class="form-control" formControlName="unitPrice" readonly>
                                </td>
                                <!-- Sub Total -->
                                <td>
                                    <input class="form-control" formControlName="subTotal" readonly>
                                </td>
                                <!-- remove Item btn -->
                                <td>
                                    <button type="button"class="btn btn-danger btn-sm" (click)="removeItem(i)">
                                        Delete
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <!-- Total Amount -->
                    <div class="row">
                        <div class="col-md-12 text-end">
                            <h5>
                                Total Amount:
                                {{totalAmount | number:'1.2-2'}}
                            </h5>
                        </div>
                    </div>

                    <!-- BTN ADD NEW ITEM -->
                    <button type="button" class="btn btn-success" (click)="addItemProduct()">
                        Add Product
                    </button>
                </div>
                <hr>
                <!-- Button Submit -->
                 <div class="d-flex justify-content-end gap-2 mt-3">
                     <button type="button" class="btn btn-secondary" (click)="loadInvoiceList()">
                        Cancel
                    </button>
                    <button type="button"class="btn btn-primary"(click)="submit()">
                        {{isEditMode ? 'Update' : 'Save'}}
                    </button>
                </div>
            </form>            
        </div>
    </div>

    <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
    </div>
</div>
