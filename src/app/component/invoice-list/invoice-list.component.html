<div class="container mt-5">

<div class="d-flex justify-content-between">
    <h3>Invoice List</h3>

    <button class="btn btn-primary" (click)="addInvoice()">
        Add Invoice
    </button>
</div>
    <table class="table table-striped table-bordered mt-3">
        <thead>
            <tr>
                <th>No</th>
                <th>Invoice</th>
                <th>Customer</th>
                <th>Date</th>
                <th>Total Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let inv of invoiceLists | paginate: {
                itemsPerPage: itemsPerPage,
                currentPage: currentPage,
                totalItems: totalItems
            }; let i=index">
                <td> {{ (currentPage-1)*itemsPerPage + i + 1 }}</td>
                <td>{{inv.no}}</td>
                <td>{{inv.customer?.name}}</td>
                <td>{{inv.invoice_date | date}}</td>
                <td>{{inv.total_amount}}</td>
                <td>{{inv.status?.name}}</td>
                <td>
                    <!-- edit button -->
                    <button class="btn btn-warning btn-sm" (click)="editInv(inv.id)">
                        Edit
                    </button>
                        <!-- delete button -->
                    <button class="btn btn-danger btn-sm ms-2" (click)="deleteInv(inv.id)">
                        Delete
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
    <pagination-controls
        (pageChange)="currentPage = $event">
    </pagination-controls>
</div>
